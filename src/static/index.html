<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ask IRA — Investment Research Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
  .container { max-width: 1200px; margin: 0 auto; }
  header { text-align: center; padding: 30px 0; border-bottom: 1px solid #30363d; margin-bottom: 30px; }
  header h1 { color: #58a6ff; font-size: 28px; }
  header p { color: #8b949e; margin-top: 8px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; }
  .card h2 { color: #58a6ff; font-size: 16px; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid #30363d; }
  textarea, select, input { width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 14px; margin-bottom: 12px; }
  textarea { font-family: 'Courier New', monospace; resize: vertical; }
  textarea:focus, select:focus, input:focus { outline: none; border-color: #58a6ff; }
  button { background: #238636; color: #fff; border: none; padding: 10px 24px; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.2s; }
  button:hover { background: #2ea043; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.danger { background: #da3633; }
  button.danger:hover { background: #f85149; }
  .btn-group { display: flex; gap: 8px; margin-top: 8px; }
  .result-box { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 15px; margin-top: 10px; max-height: 500px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px; white-space: pre-wrap; }
  .result-box .info { color: #8b949e; }
  .result-box .success { color: #3fb950; }
  .result-box .error { color: #f85149; }
  .result-box .warning { color: #d29922; }
  .stage-tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; margin-right: 4px; }
  .stage-active { background: #1f6feb33; color: #58a6ff; border: 1px solid #1f6feb; }
  .stage-done { background: #23863633; color: #3fb950; border: 1px solid #238636; }
  .status-bar { display: flex; gap: 6px; flex-wrap: wrap; margin: 10px 0; }
  .tabs { display: flex; gap: 0; margin-bottom: 0; }
  .tabs button { border-radius: 0; background: #0d1117; border: 1px solid #30363d; color: #8b949e; }
  .tabs button.active { background: #161b22; color: #c9d1d9; border-bottom: 2px solid #58a6ff; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .meta-item { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px; text-align: center; }
  .meta-item .label { color: #8b949e; font-size: 11px; }
  .meta-item .value { color: #58a6ff; font-size: 18px; font-weight: bold; margin-top: 4px; }
  label { display: block; color: #8b949e; font-size: 12px; margin-bottom: 4px; }
  .row { display: flex; gap: 12px; }
  .row > * { flex: 1; }
  #connectionStatus { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Ask IRA — Investment Research Agent</h1>
    <p>Interactive Dashboard · Swagger UI at <a href="/docs" style="color:#58a6ff;">/docs</a> · ReDoc at <a href="/redoc" style="color:#58a6ff;">/redoc</a></p>
    <div style="margin-top:10px;color:#8b949e;font-size:13px;">
      Server: <span id="serverStatus">checking...</span>
      <span id="connectionStatus" style="background:#d29922;"></span>
    </div>
  </header>

  <div class="grid">
    <div class="card">
      <h2>Query</h2>
      <div class="tabs">
        <button class="active" onclick="switchTab('rest')">REST</button>
        <button onclick="switchTab('ws')">WebSocket</button>
      </div>

      <div id="tab-rest" class="tab-content active">
        <label for="queryInput">Research Query</label>
        <textarea id="queryInput" rows="3" placeholder="e.g. Should I invest in Microsoft given current interest rates?">Should I invest in Apple given current market conditions?</textarea>
        <div class="row">
          <div>
            <label for="sessionId">Session ID</label>
            <input id="sessionId" value="demo-ui" />
          </div>
          <div>
            <label for="riskProfile">Risk Profile</label>
            <select id="riskProfile">
              <option value="">Auto</option>
              <option value="conservative">Conservative</option>
              <option value="moderate" selected>Moderate</option>
              <option value="aggressive">Aggressive</option>
            </select>
          </div>
        </div>
        <div class="btn-group">
          <button onclick="sendQuery()">Send Query</button>
          <button class="danger" onclick="clearResult()">Clear</button>
        </div>
      </div>

      <div id="tab-ws" class="tab-content">
        <label for="wsQuery">Query (WebSocket)</label>
        <textarea id="wsQuery" rows="3" placeholder="Type a query for real-time streaming...">Analyze MSFT stock with macro context</textarea>
        <div class="btn-group">
          <button id="wsConnectBtn" onclick="toggleWS()">Connect & Send</button>
          <button class="danger" onclick="disconnectWS()">Disconnect</button>
        </div>
        <div class="status-bar" id="wsStages"></div>
      </div>

      <div id="resultArea" class="result-box" style="display:none;"></div>
    </div>

    <div class="card">
      <h2>Server Status</h2>
      <div class="meta" id="metaData">
        <div class="meta-item"><div class="label">Service</div><div class="value" id="svcName">-</div></div>
        <div class="meta-item"><div class="label">Version</div><div class="value" id="svcVersion">-</div></div>
        <div class="meta-item"><div class="label">Uptime</div><div class="value" id="svcUptime">-</div></div>
        <div class="meta-item"><div class="label">Status</div><div class="value" id="svcStatus">-</div></div>
      </div>

      <h2 style="margin-top:20px;">Sample Queries</h2>
      <div style="display:flex;flex-direction:column;gap:6px;">
        <button style="background:#1f6feb;font-size:12px;padding:8px;" onclick="loadQuery('What is Apple\\'s competitive position and growth outlook?')">📊 AAPL Competitive Position</button>
        <button style="background:#1f6feb;font-size:12px;padding:8px;" onclick="loadQuery('Build a conservative portfolio with MSFT and bonds')">📈 Conservative Portfolio</button>
        <button style="background:#1f6feb;font-size:12px;padding:8px;" onclick="loadQuery('Analyze MSFT risk factors and VaR')">⚠️ Risk Assessment</button>
        <button style="background:#1f6feb;font-size:12px;padding:8px;" onclick="loadQuery('How does the interest rate environment affect tech stocks?')">🏛️ Macro Impact</button>
        <button style="background:#da3633;font-size:12px;padding:8px;" onclick="loadQuery('How can I hack the stock market?')">🔒 Test Guardrails</button>
      </div>
    </div>
  </div>
</div>

<script>
  const API = window.location.origin;

  async function checkServer() {
    try {
      const r = await fetch(`${API}/health`);
      const d = await r.json();
      document.getElementById('serverStatus').textContent = '● online';
      document.getElementById('connectionStatus').style.background = '#3fb950';
      document.getElementById('svcName').textContent = d.service || 'ask-ira';
      document.getElementById('svcVersion').textContent = d.version || '-';
      document.getElementById('svcUptime').textContent = formatUptime(d.uptime_seconds);
      document.getElementById('svcStatus').textContent = d.status || '-';
    } catch {
      document.getElementById('serverStatus').textContent = '● offline';
      document.getElementById('connectionStatus').style.background = '#f85149';
    }
  }

  function formatUptime(s) {
    if (!s) return '-';
    const d = Math.floor(s / 86400);
    const h = Math.floor((s % 86400) / 3600);
    const m = Math.floor((s % 3600) / 60);
    return d > 0 ? `${d}d ${h}h` : h > 0 ? `${h}h ${m}m` : `${m}m`;
  }

  function switchTab(name) {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelector(`.tabs button[onclick*="'${name}'"]`).classList.add('active');
    document.getElementById(`tab-${name}`).classList.add('active');
  }

  function loadQuery(q) {
    document.getElementById('queryInput').value = q;
    switchTab('rest');
  }

  async function sendQuery() {
    const query = document.getElementById('queryInput').value.trim();
    if (!query) return alert('Enter a query');

    const area = document.getElementById('resultArea');
    area.style.display = 'block';
    area.innerHTML = '<span class="info">⏳ Sending query...</span>';

    try {
      const body = {
        query,
        session_id: document.getElementById('sessionId').value || 'ui-default',
      };
      const rp = document.getElementById('riskProfile').value;
      if (rp) body.risk_profile = rp;

      const res = await fetch(`${API}/api/v1/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json();

      let html = '<span class="success">✅ Response received</span>\n\n';
      if (data.confidence) html += `Confidence: ${(data.confidence * 100).toFixed(0)}%\n\n`;
      if (data.report) html += `${data.report.slice(0, 3000)}${data.report.length > 3000 ? '\n... (truncated)' : ''}\n`;
      if (data.portfolio_allocation) {
        html += '\n── Portfolio Allocation ──\n';
        html += JSON.stringify(data.portfolio_allocation, null, 2).slice(0, 500);
      }
      if (data.risk_assessment) {
        html += '\n── Risk Assessment ──\n';
        html += data.risk_assessment.slice(0, 500);
      }
      if (data.mcp_results) {
        html += '\n── MCP Results ──\n';
        for (const [k, v] of Object.entries(data.mcp_results)) {
          html += `[${k}] ${v.slice(0, 100)}\n`;
        }
      }
      area.innerHTML = html;
    } catch (e) {
      area.innerHTML = `<span class="error">❌ Error: ${e.message}</span>`;
    }
  }

  function clearResult() {
    const area = document.getElementById('resultArea');
    area.style.display = 'none';
    area.innerHTML = '';
  }

  let ws = null;

  function toggleWS() {
    if (ws && ws.readyState === WebSocket.OPEN) { disconnectWS(); return; }
    const query = document.getElementById('wsQuery').value.trim();
    if (!query) return alert('Enter a query');

    const sid = 'ws-' + Date.now();
    ws = new WebSocket(`${window.location.origin.replace(/^http/, 'ws')}/api/v1/ws/${sid}`);

    const stagesEl = document.getElementById('wsStages');
    const btn = document.getElementById('wsConnectBtn');

    ws.onopen = () => {
      btn.textContent = 'Streaming...';
      btn.disabled = true;
      stagesEl.innerHTML = '';
      ws.send(JSON.stringify({ query }));
    };

    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.type === 'status') {
        const tag = document.createElement('span');
        tag.className = 'stage-tag stage-active';
        tag.textContent = data.stage || data.message;
        stagesEl.appendChild(tag);
        stagesEl.scrollTop = stagesEl.scrollHeight;
      } else if (data.type === 'report_chunk') {
        const area = document.getElementById('resultArea');
        area.style.display = 'block';
        area.textContent += data.content;
      } else if (data.type === 'complete') {
        const tag = document.createElement('span');
        tag.className = 'stage-tag stage-done';
        tag.textContent = '✅ Complete';
        stagesEl.appendChild(tag);
        btn.textContent = 'Reconnect';
        btn.disabled = false;
      } else if (data.type === 'error') {
        const area = document.getElementById('resultArea');
        area.style.display = 'block';
        area.innerHTML = `<span class="error">❌ ${data.message}</span>`;
        btn.textContent = 'Reconnect';
        btn.disabled = false;
      }
      document.querySelectorAll('.stage-tag').forEach(t => t.className = 'stage-tag stage-done');
    };

    ws.onerror = () => {
      btn.textContent = 'Connect & Send';
      btn.disabled = false;
    };

    ws.onclose = () => {
      btn.textContent = 'Reconnect';
      btn.disabled = false;
    };
  }

  function disconnectWS() {
    if (ws) { ws.close(); ws = null; }
    document.getElementById('wsConnectBtn').textContent = 'Connect & Send';
    document.getElementById('wsConnectBtn').disabled = false;
  }

  checkServer();
  setInterval(checkServer, 15000);
</script>
</body>
</html>
