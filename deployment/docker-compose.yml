services:
  api:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    image: ask-ira:latest
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: ../.env
    environment:
      POSTGRES_DSN: "postgresql://askira:${POSTGRES_PASSWORD:-askira_secret}@postgres:5432/askira"
      REDIS_URL: "redis://redis:6379/0"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - chromadb_data:/app/data/chroma_db
      - ../data:/app/data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: askira
      POSTGRES_USER: askira
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-askira_secret}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../data/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U askira -d askira"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  seed:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    image: ask-ira:latest
    profiles:
      - seed
    env_file: ../.env
    environment:
      POSTGRES_DSN: "postgresql://askira:${POSTGRES_PASSWORD:-askira_secret}@postgres:5432/askira"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["python", "-m", "scripts.seed_data"]
    volumes:
      - chromadb_data:/app/data/chroma_db
    restart: no

volumes:
  pgdata:
  chromadb_data:
  redis_data:
