name: PR Checks

on:
  pull_request:
    types: [opened, edited, synchronize, labeled, unlabeled]

permissions:
  pull-requests: read
  contents: read

jobs:
  pr-size:
    name: PR Size Label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add size label
        uses: pascalgn/size-label-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          sizes: >
            {"XS": "2", "S": "20", "M": "100", "L": "500", "XL": "1000", "XXL": "2000"}

  pr-title:
    name: Conventional Commit Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const pattern = /^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?: .{1,}/;
            if (!pattern.test(title)) {
              core.warning(
                `PR title "${title}" does not follow conventional commit format. ` +
                `Expected: feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert(scope): description`
              );
            }

  pr-labels:
    name: Required Labels
    runs-on: ubuntu-latest
    steps:
      - name: Check labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (labels.length === 0) {
              core.warning('PR has no labels. Add at least one label (e.g., "feat", "fix", "chore").');
            }
