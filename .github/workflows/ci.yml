# =============================================================================
# Ask IRA — CI Pipeline
# =============================================================================
# Runs on every push/PR: lint → audit → test (3.11 + 3.12) → Docker build
# OpenAI key is required for tests (your key).
# =============================================================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      # Install core + OpenAI dep (you have a key) + dev + free LLMs
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[groq,gemini,ollama,huggingface,mistral,dev,mcp,eval]"

      - name: Lint with ruff
        run: ruff check src/ tests/ scripts/ --output-format=github

      - name: Type check (optional)
        run: |
          pip install mypy
          mypy src/ --ignore-missing-imports --warn-unused-ignores || true

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -e ".[dev,mcp,eval]"

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit --strict --progress-spinner=off
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[groq,gemini,ollama,huggingface,mistral,dev,mcp,eval]"

      - name: Run tests with coverage
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term --timeout=60 -x

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/Dockerfile
          load: true
          tags: ask-ira:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.19.0
        with:
          image-ref: ask-ira:ci-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 1
          hide-progress: true
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Run container smoke test
        run: |
          docker run -d --name ask-ira-test -p 8000:8000 ask-ira:ci-${{ github.sha }}
          sleep 5
          curl -f http://localhost:8000/health || (docker logs ask-ira-test && exit 1)
          docker stop ask-ira-test
